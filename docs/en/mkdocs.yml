markdown_extensions:
- attr_list
- toc:
    permalink: true
- mdx_include:
    base_path: docs/
- admonition
- extra
- pymdownx.superfences
- pymdownx.tabbed:
    alternate_style: true
- pymdownx.highlight
- md_in_html
extra:
  alternate:
  - link: /
    name: en - English
  - link: /pt/
    name: pt - português
hooks:
- ../../scripts/hooks.py
