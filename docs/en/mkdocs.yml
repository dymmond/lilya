site_name: Lilya
site_description: The ASGI toolkit that delivers.
site_url: https://lilya.dev
theme:
  name: material
  language: en
  palette:
  - scheme: default
    primary: light blue
    accent: amber
    media: '(prefers-color-scheme: light)'
    toggle:
      icon: material/lightbulb
      name: Switch to dark mode
  - scheme: slate
    media: '(prefers-color-scheme: dark)'
    primary: light blue
    accent: amber
    toggle:
      icon: material/lightbulb-outline
      name: Switch to light mode
  favicon: statics/images/favicon.ico
  logo: statics/images/white.png
  features:
  - search.suggest
  - search.highlight
  - content.tabs.link
  - content.code.copy
  - content.code.annotate
  - content.tooltips
  - content.code.select
  - navigation.indexes
  - navigation.path
  - navigation.tabs
repo_name: dymmond/lilya
repo_url: https://github.com/dymmond/lilya
edit_uri: ''
plugins:
- search
- meta-descriptions:
    export_csv: false
    quiet: false
    enable_checks: false
    min_length: 50
    max_length: 160
    trim: false
- mkdocstrings:
    handlers:
      python:
        options:
          extensions:
          - griffe_typingdoc
          show_root_heading: true
          show_if_no_docstring: true
          preload_modules:
          - httpx
          - a2wsgi
          inherited_members: true
          members_order: source
          separate_signature: true
          unwrap_annotated: true
          filters:
          - '!^_'
          merge_init_into_class: true
          docstring_section_style: spacy
          signature_crossrefs: true
          show_symbol_type_heading: true
          show_symbol_type_toc: true
nav:
- index.md
- Getting Started:
  - getting-started/index.md
  - getting-started/install-and-first-app.md
  - getting-started/first-production-run.md
- Concepts:
  - concepts/index.md
  - concepts/asgi-mental-model.md
  - concepts/request-lifecycle.md
  - concepts/layering-and-precedence.md
  - concepts/component-interactions.md
  - architecture.md
- Tutorials:
  - tutorials/index.md
  - tutorials/build-a-modular-api.md
  - tutorials/add-auth-and-permissions.md
  - tutorials/realtime-with-websockets.md
- How-to Guides:
  - guides/index.md
  - guides/developer-workflow-local-dev-test-debug.md
  - guides/production-readiness-checklist.md
  - guides/migration-from-fastapi.md
- Reference:
  - resources/index.md
  - applications.md
  - settings.md
  - routing.md
  - controllers.md
  - requests.md
  - responses.md
  - dependencies.md
  - middleware.md
  - permissions.md
  - exceptions.md
  - authentication.md
  - security.md
  - parameters.md
  - introspection.md
  - features/index.md
  - lifecycle.md
  - lifespan.md
  - tasks.md
  - observables.md
  - static-files.md
  - templates.md
  - server-push.md
  - websockets.md
  - wsgi.md
  - encoders.md
  - serializers.md
  - caching.md
  - context.md
  - logging.md
  - threadpool.md
  - clients/index.md
  - Lilya Client:
    - lilya-cli.md
    - directives/discovery.md
    - directives/directives.md
    - directives/custom-directives.md
    - directives/directive-decorator.md
    - directives/shell.md
