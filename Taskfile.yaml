version: 3

tasks:
  # --------------------------- SETUP ------------------------------------

  activate:
    desc: Activates the virtual environment in development mode
    cmds:
      - hatch shell

  clean:
    desc: Cleans caching, pyc and pycache files
    cmds:
      - hatch run clean_pyc
      - hatch run clean_pyi
      - hatch run clean_pycache

  build_with_checks:
    desc: Builds the project with checks
    cmds:
      - hatch run build_with_check

  lint:
    desc: Lints the project
    cmds:
      - hatch run lint

  format:
    desc: Formats the project
    cmds:
      - hatch run format

  ty:
    desc: Runs the type checker only, no formatting
    cmds:
      - hatch run test:check_types

  #---------------------------- DOCS -------------------------------

  docs_prepare:
    desc: Prepares documentation sources for Zensical
    cmds:
      - hatch run docs:prepare

  docs_clean:
    desc: Cleans generated docs artifacts
    cmds:
      - hatch run docs:clean

  build:
    desc: Builds the documentation
    cmds:
      - hatch run docs:build

  serve:
    desc: Runs the documentation in live mode
    cmds:
      - hatch run docs:serve

  serve_dev:
    desc: Runs the documentation in dev mode
    cmds:
      - hatch run docs:dev

  # --------------------------- TEST ------------------------------------

  test:
    desc: Runs the suite tests
    env:
      LILYA_SETTINGS_MODULE: tests.settings.AppTestSettings
    cmds:
      - hatch run test:test {{ .ARGS }}

  test_non_cli:
    desc: Runs non-CLI tests in parallel (CI lane A)
    env:
      LILYA_SETTINGS_MODULE: tests.settings.AppTestSettings
    cmds:
      - hatch run test:test_non_cli {{ .ARGS }}

  test_cli:
    desc: Runs CLI tests in serial mode (CI lane B)
    env:
      LILYA_SETTINGS_MODULE: tests.settings.AppTestSettings
    cmds:
      - hatch run test:test_cli {{ .ARGS }}

  test_serial_only:
    desc: Runs @pytest.mark.serial tests in serial mode (CI lane C)
    env:
      LILYA_SETTINGS_MODULE: tests.settings.AppTestSettings
    cmds:
      - hatch run test:test_serial_only {{ .ARGS }}

  test_serial:
    desc: Runs the full suite in serial mode (fallback)
    env:
      LILYA_SETTINGS_MODULE: tests.settings.AppTestSettings
    cmds:
      - hatch run test:test_serial {{ .ARGS }}

  test_ci_split:
    desc: Runs all CI test lanes locally (A+B+C)
    env:
      LILYA_SETTINGS_MODULE: tests.settings.AppTestSettings
    cmds:
      - task: test_non_cli
      - task: test_cli
      - task: test_serial_only

  test_man:
    desc: Runs the manual tests with more output details and python breakpoints allowed
    env:
      LILYA_SETTINGS_MODULE: tests.settings.AppTestSettings
    cmds:
      - hatch run test:test_man {{ .ARGS }}

  coverage:
    desc: Runs the coverage tests
    env:
      LILYA_SETTINGS_MODULE: tests.settings.AppTestSettings
    cmds:
      - hatch run test:coverage {{ .ARGS }}
